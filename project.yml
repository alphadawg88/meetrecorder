name: MeetRecorder
targets:
  MeetRecorder:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - MeetRecorder
    settings:
      base:
        SWIFT_VERSION: "5.0"
        PRODUCT_NAME: MeetRecorder
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredwong.meetrecorder
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MeetRecorder needs microphone access to record your voice during meetings."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "MeetRecorder reads your calendar to detect meetings and offer recording reminders."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "MeetRecorder uses Apple Events to interact with system audio."
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: MeetRecorder/MeetRecorder.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.automation.apple-events: true
    dependencies:
      - package: KeyboardShortcuts
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
