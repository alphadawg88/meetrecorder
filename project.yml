name: Glyph
targets:
  Glyph:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - MeetRecorder
    settings:
      base:
        SWIFT_VERSION: "5.0"
        PRODUCT_NAME: Glyph
        # Stable self-signed identity so the Screen Recording / Mic TCC grant
        # survives rebuilds (ad-hoc keys TCC to a per-build cdhash → re-prompts).
        # Cert "Glyph Local Signing" lives in the login keychain (self-signed,
        # codeSigning EKU). Recreate via the openssl+security steps if missing.
        CODE_SIGN_IDENTITY: "Glyph Local Signing"
        CODE_SIGN_STYLE: Manual
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredwong.glyph
        MARKETING_VERSION: 1.1.0
        CURRENT_PROJECT_VERSION: 3
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Glyph needs microphone access to record your voice during meetings."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Glyph reads your calendar to detect meetings and offer recording reminders."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Glyph uses Apple Events to interact with system audio."
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: MeetRecorder/Glyph.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.automation.apple-events: true
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.18.0
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    minorVersion: 2.30.6   # 2.30.x pins swift-transformers 1.1.x to match WhisperKit 0.18
