<svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
  <!--
    Menu Bar Icon Template — The Capture
    A circle containing a waveform. Rendered as a template image
    so macOS tints it automatically for light/dark mode.
  -->

  <!-- Outer circle -->
  <circle cx="9" cy="9" r="6.5" stroke="black" stroke-width="1.3" fill="none"/>

  <!-- Waveform inside -->
  <path d="M 5 9 C 6.5 6.5, 8 6.5, 9 9 C 10 11.5, 11.5 11.5, 13 9"
        stroke="black" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
