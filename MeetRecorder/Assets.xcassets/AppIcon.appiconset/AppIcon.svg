<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: subtle warm-to-neutral dark gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>

    <!-- Inner highlight for depth -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App icon background: rounded rect matching macOS superellipse -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Inner top highlight for surface depth -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#highlight)"/>

  <!--
    The Capture
    A circle containing a waveform — the universal record symbol
    infused with audio identity. Strong recognition at all scales.
  -->

  <!-- Outer circle: capture boundary -->
  <circle cx="512" cy="512" r="340" stroke="#FFFFFF" stroke-width="24" fill="none" opacity="0.95"/>

  <!-- Waveform: a single flowing curve inside the circle -->
  <path d="M 300 512 C 380 380, 460 380, 512 512 C 564 644, 644 644, 724 512"
        stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
</svg>
